<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 世界杯预测分析系统</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="logo">
                <h1>🏆 2026 世界杯</h1>
                <p>预测分析系统</p>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active" data-section="home">
                    <i class="fas fa-home"></i> 首页
                </a>
                <a href="#" class="nav-item" data-section="teams">
                    <i class="fas fa-users"></i> 球队分析
                </a>
                <a href="#" class="nav-item" data-section="matches">
                    <i class="fas fa-futbol"></i> 比赛预测
                </a>
                <a href="#" class="nav-item" data-section="compare">
                    <i class="fas fa-exchange-alt"></i> 球队对比
                </a>
                <a href="#" class="nav-item" data-section="players">
                    <i class="fas fa-user"></i> 球员数据
                </a>
                <a href="#" class="nav-item" data-section="bracket">
                    <i class="fas fa-sitemap"></i> 淘汰赛对阵
                </a>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 首页 -->
            <section id="home" class="section active">
                <div class="hero">
                    <h2>2026 美加墨世界杯</h2>
                    <p>全方位赛事分析与智能预测</p>
                </div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <i class="fas fa-trophy"></i>
                        <h3>48 支球队</h3>
                        <p>参赛队伍</p>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-calendar"></i>
                        <h3>104 场比赛</h3>
                        <p>赛事场次</p>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-chart-line"></i>
                        <h3>AI 预测</h3>
                        <p>智能分析</p>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-database"></i>
                        <h3>实时数据</h3>
                        <p>球员信息</p>
                    </div>
                </div>
                <div class="quick-links">
                    <h3>热门比赛预测</h3>
                    <div class="match-cards" id="hotMatches"></div>
                </div>
            </section>

            <!-- 球队分析 -->
            <section id="teams" class="section">
                <h2>球队分析</h2>
                <div class="group-selector">
                    <button class="group-btn active" data-group="A">A 组</button>
                    <button class="group-btn" data-group="B">B 组</button>
                    <button class="group-btn" data-group="C">C 组</button>
                    <button class="group-btn" data-group="D">D 组</button>
                    <button class="group-btn" data-group="E">E 组</button>
                    <button class="group-btn" data-group="F">F 组</button>
                    <button class="group-btn" data-group="G">G 组</button>
                    <button class="group-btn" data-group="H">H 组</button>
                    <button class="group-btn" data-group="I">I 组</button>
                    <button class="group-btn" data-group="J">J 组</button>
                    <button class="group-btn" data-group="K">K 组</button>
                    <button class="group-btn" data-group="L">L 组</button>
                </div>
                <div class="teams-grid" id="teamsGrid"></div>
                <!-- 球队球员展示区 -->
                <div class="team-players-section" id="teamPlayersSection">
                    <h3 id="teamPlayersTitle">选择球队查看球员</h3>
                    <div class="team-players-grid" id="teamPlayersGrid"></div>
                </div>
            </section>

            <!-- 比赛预测 (只显示确定的小组赛) -->
            <section id="matches" class="section">
                <h2>小组赛赛程</h2>
                <div class="group-stage-container">
                    <div class="group-selector">
                        <button class="group-btn active" data-match-group="A">A 组</button>
                        <button class="group-btn" data-match-group="B">B 组</button>
                        <button class="group-btn" data-match-group="C">C 组</button>
                        <button class="group-btn" data-match-group="D">D 组</button>
                        <button class="group-btn" data-match-group="E">E 组</button>
                        <button class="group-btn" data-match-group="F">F 组</button>
                        <button class="group-btn" data-match-group="G">G 组</button>
                        <button class="group-btn" data-match-group="H">H 组</button>
                        <button class="group-btn" data-match-group="I">I 组</button>
                        <button class="group-btn" data-match-group="J">J 组</button>
                        <button class="group-btn" data-match-group="K">K 组</button>
                        <button class="group-btn" data-match-group="L">L 组</button>
                    </div>
                    <div class="matches-list" id="matchesList"></div>
                </div>
            </section>

            <!-- 球队对比 -->
            <section id="compare" class="section">
                <h2>球队对比</h2>
                <div class="compare-selector">
                    <div class="team-select">
                        <label>球队 A</label>
                        <select id="teamA"></select>
                    </div>
                    <div class="vs-badge">VS</div>
                    <div class="team-select">
                        <label>球队 B</label>
                        <select id="teamB"></select>
                    </div>
                    <button id="compareBtn" class="btn-primary">开始对比</button>
                </div>
                <div class="compare-result" id="compareResult"></div>
            </section>

            <!-- 球员数据 -->
            <section id="players" class="section">
                <h2>球员数据</h2>
                <div class="player-filters">
                    <select id="playerTeamFilter">
                        <option value="all">全部球队</option>
                    </select>
                    <select id="positionFilter">
                        <option value="all">全部位置</option>
                        <option value="GK">门将</option>
                        <option value="DF">后卫</option>
                        <option value="MF">中场</option>
                        <option value="FW">前锋</option>
                    </select>
                    <input type="text" id="playerSearch" placeholder="搜索球员...">
                </div>
                <div class="players-grid" id="playersGrid"></div>
            </section>

            <!-- 淘汰赛对阵 (树状图) -->
            <section id="bracket" class="section">
                <h2>淘汰赛对阵树状图</h2>
                <div class="bracket-controls">
                    <button class="btn-primary" id="resetBracket">
                        <i class="fas fa-redo"></i> 重置预测
                    </button>
                    <button class="btn-primary" id="saveBracket">
                        <i class="fas fa-save"></i> 保存预测
                    </button>
                </div>
                <div class="tournament-tree" id="tournamentTree">
                    <!-- 左半区 -->
                    <div class="tree-half left-half">
                        <div class="tree-round round-32">
                            <h4>32强</h4>
                            <div class="tree-matches" id="treeRound32Left"></div>
                        </div>
                        <div class="tree-round round-16">
                            <h4>16强</h4>
                            <div class="tree-matches" id="treeRound16Left"></div>
                        </div>
                        <div class="tree-round quarter">
                            <h4>8强</h4>
                            <div class="tree-matches" id="treeQuarterLeft"></div>
                        </div>
                        <div class="tree-round semi">
                            <h4>半决赛</h4>
                            <div class="tree-matches" id="treeSemiLeft"></div>
                        </div>
                    </div>

                    <!-- 决赛区域 -->
                    <div class="tree-center">
                        <div class="tree-round final-round">
                            <h4>🏆 决赛</h4>
                            <div class="tree-matches" id="treeFinal"></div>
                        </div>
                        <div class="tree-round third-place">
                            <h4>🥉 三四名</h4>
                            <div class="tree-matches" id="treeThirdPlace"></div>
                        </div>
                        <div class="champion-display" id="championDisplay">
                            <div class="champion-trophy">🏆</div>
                            <div class="champion-team" id="championTeam">冠军待定</div>
                        </div>
                    </div>

                    <!-- 右半区 -->
                    <div class="tree-half right-half">
                        <div class="tree-round semi">
                            <h4>半决赛</h4>
                            <div class="tree-matches" id="treeSemiRight"></div>
                        </div>
                        <div class="tree-round quarter">
                            <h4>8强</h4>
                            <div class="tree-matches" id="treeQuarterRight"></div>
                        </div>
                        <div class="tree-round round-16">
                            <h4>16强</h4>
                            <div class="tree-matches" id="treeRound16Right"></div>
                        </div>
                        <div class="tree-round round-32">
                            <h4>32强</h4>
                            <div class="tree-matches" id="treeRound32Right"></div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- 比赛详情弹窗 -->
    <div class="modal" id="matchModal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="matchDetail"></div>
        </div>
    </div>

    <!-- 球员详情弹窗 -->
    <div class="modal" id="playerModal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="playerDetail"></div>
        </div>
    </div>

    <script src="data/teams.js"></script>
    <script src="data/players.js"></script>
    <script src="data/matches.js"></script>
    <script src="data/tournament.js"></script>
    <script src="js/bracket.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
